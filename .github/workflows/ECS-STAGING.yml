name: Build and Push COMM Image to AWS ECR
on:
  push:
    branches:
      - Staging
jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push the Image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ secrets.AWS_COMM_ECR_REGISTRY_STAGING }}
        ECR_REPOSITORY: ${{ secrets.AWS_COMM_REPOSITORY_STAGING }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Force deployment
      run: |
        aws ecs update-service --cluster ${{ secrets.AWS_COMM_CLUSTER_STAGING }} --service ${{ secrets.AWS_COMM_SERVICE_STAGING }} --force-new-deployment
